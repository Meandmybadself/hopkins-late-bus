<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Late Bus Alert — Hopkins School District</title>
  <meta name="description" content="Get an email when your child's school bus is running late. Free notifications for Hopkins school district families.">

  <!-- Open Graph -->
  <meta property="og:title" content="Late Bus Alert">
  <meta property="og:description" content="Get an email when your child's school bus is running late. Free notifications for Hopkins school district families.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://latebus.meandmybadself.com">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Late Bus Alert">
  <meta name="twitter:description" content="Get an email when your child's school bus is running late. Free notifications for Hopkins school district families.">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Late Bus Alert</h1>
    <p>Hopkins School District, Hopkins, MN</p>
    <p>Get an email when your child's bus is running late.</p>

    <form id="subscribe-form">
      <label for="bus-route">Bus Route Number</label>
      <input type="text" id="bus-route" name="busRoute" required placeholder="e.g. 42">

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="parent@example.com">

      <button type="submit">Subscribe</button>
    </form>

    <div id="message" class="message" hidden></div>

    <p class="footer-link">Want to unsubscribe? <a href="unsubscribe.html">Click here</a></p>
  </main>

  <script>
    const form = document.getElementById("subscribe-form");
    const messageEl = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      messageEl.hidden = true;

      const busRoute = form.busRoute.value.trim();
      const email = form.email.value.trim();

      try {
        const res = await fetch("/api/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, busRoute }),
        });

        const data = await res.json();
        messageEl.hidden = false;

        if (res.ok) {
          messageEl.className = "message success";
          messageEl.textContent = data.message;
          form.reset();
        } else {
          messageEl.className = "message error";
          messageEl.textContent = data.error || "Something went wrong.";
        }
      } catch {
        messageEl.hidden = false;
        messageEl.className = "message error";
        messageEl.textContent = "Unable to connect. Please try again.";
      }
    });
  </script>
</body>
</html>
